name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Build and publish release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore TokenDock.sln

      - name: Test
        run: dotnet test TokenDock.sln -c Release --no-restore

      - name: Read version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(.+)$') {
            throw "Release tag must start with v. Actual: $tag"
          }
          $version = $Matches[1]
          $publishDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/publish'
          $installerDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/installer'
          $wingetManifestDir = Join-Path $env:GITHUB_WORKSPACE 'artifacts/winget'
          $releaseDate = Get-Date -Format 'yyyy-MM-dd'
          "APP_VERSION=$version" >> $env:GITHUB_ENV
          "PUBLISH_DIR=$publishDir" >> $env:GITHUB_ENV
          "INSTALLER_DIR=$installerDir" >> $env:GITHUB_ENV
          "WINGET_MANIFEST_DIR=$wingetManifestDir" >> $env:GITHUB_ENV
          "RELEASE_DATE=$releaseDate" >> $env:GITHUB_ENV

      - name: Publish app
        run: >
          dotnet publish src/TokenDock/TokenDock.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:Version=${{ env.APP_VERSION }}
          -o artifacts/publish

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --yes --no-progress

      - name: Build installer
        shell: pwsh
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\TokenDock.iss'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes/v${{ env.APP_VERSION }}.md
          files: artifacts/installer/TokenDockSetup-v${{ env.APP_VERSION }}-win-x64.exe

      - name: Install wingetcreate
        shell: pwsh
        run: choco install wingetcreate --yes --no-progress

      - name: Generate winget manifest
        shell: pwsh
        run: >
          wingetcreate update lukewire129.TokenDock
          --version ${{ env.APP_VERSION }}
          --urls "https://github.com/lukewire129/TokenDock/releases/download/v${{ env.APP_VERSION }}/TokenDockSetup-v${{ env.APP_VERSION }}-win-x64.exe|x64"
          --release-notes-url "https://github.com/lukewire129/TokenDock/releases/tag/v${{ env.APP_VERSION }}"
          --release-date "${{ env.RELEASE_DATE }}"
          --out "${{ env.WINGET_MANIFEST_DIR }}"

      - name: Upload winget manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-manifest-v${{ env.APP_VERSION }}
          path: artifacts/winget
